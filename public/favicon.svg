<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Sage background -->
  <rect width="64" height="64" rx="12" fill="#5a6b5e"/>

  <defs>
    <style>
      .stroke { stroke: #f7f3eb; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .node { fill: #f7f3eb; }
    </style>
  </defs>

  <!-- House outline -->
  <path class="stroke" d="M10 28 L32 10 L54 28 V54 H10 Z"/>

  <!-- Neural connections -->
  <line class="stroke" x1="22" y1="36" x2="32" y2="28"/>
  <line class="stroke" x1="32" y1="28" x2="42" y2="36"/>
  <line class="stroke" x1="32" y1="28" x2="32" y2="44"/>

  <!-- Nodes -->
  <circle class="node" cx="22" cy="36" r="2.5"/>
  <circle class="node" cx="32" cy="28" r="2.5"/>
  <circle class="node" cx="42" cy="36" r="2.5"/>
  <circle class="node" cx="32" cy="44" r="2.5"/>
</svg>
